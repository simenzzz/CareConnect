name: careconnect-dev

# Full dev stack: Postgres + backend (hot-reload) + frontend (Vite). Run with:
#   docker compose -f docker-compose-dev.yml up --build
# Containerized checks live under the `test` profile (see backend-check / frontend-check):
#   docker compose -f docker-compose-dev.yml --profile test run --rm backend-check
# (The production-like stack lives in docker-compose-prod.yml.)

services:
  postgres:
    image: postgres:16-alpine
    # Feed the official Postgres image from the backend Docker env file so the
    # dev stack can run without CLI --env-file interpolation flags.
    env_file:
      - ${BACKEND_ENV_FILE:-./backend/.env.docker}
    environment:
      NODE_ENV: development
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
      - ./backend/fixtures/dev_seed.sh:/docker-entrypoint-initdb.d/002-dev-seed.sh:ro
      - ./backend/fixtures:/dev-seed:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10

  api-dev:
    build:
      context: ./backend
      target: dev
    env_file:
      - ${BACKEND_ENV_FILE:-./backend/.env.docker}
    # Pin development mode here so this stack always runs in dev regardless of the
    # env file (compose `environment` wins over `env_file`). The prod stack pins
    # NODE_ENV=production in docker-compose-prod.yml.
    environment:
      NODE_ENV: development
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

  web-dev:
    build:
      context: ./my-app
      target: dev
    env_file:
      - ./my-app/.env
    ports:
      - "5173:5173"
    volumes:
      - ./my-app:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api-dev
    command: npm run dev -- --host 0.0.0.0

  backend-check:
    build:
      context: ./backend
      target: dev
    profiles: ["test"]
    env_file:
      - ${BACKEND_ENV_FILE:-./backend/.env.docker}
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "npm run build && npm test"

  frontend-check:
    build:
      context: ./my-app
      target: dev
    profiles: ["test"]
    env_file:
      - ./my-app/.env
    volumes:
      - ./my-app:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm run build && npm run lint && npm test"

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
