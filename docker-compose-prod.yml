name: careconnect-prod

# Production-like stack: Postgres + built backend image + built frontend image.
# Run with:
#   docker compose -f docker-compose-prod.yml \
#     --env-file backend/.env.docker --env-file my-app/.env up --build
# (The dev stack lives in docker-compose-dev.yml.)

services:
  postgres:
    image: postgres:16-alpine
    # Configured from the env file (POSTGRES_* keys) so no `--env-file`
    # interpolation is needed. The healthcheck reads the container's own env
    # (`$$` → a literal `$` for Compose, expanded by the shell in the container).
    env_file:
      - ${BACKEND_ENV_FILE:-./backend/.env.docker}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10

  api-prod:
    build:
      context: ./backend
      target: prod
    env_file:
      - ${BACKEND_ENV_FILE:-./backend/.env.docker}
    # Pin production mode here: compose `environment` wins over `env_file`, so a
    # stray `NODE_ENV=development` in the env file can't silently disable prod
    # hardening (DB TLS, error masking, payment fail-fast). Do NOT remove.
    environment:
      NODE_ENV: production
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    depends_on:
      postgres:
        condition: service_healthy

  web-prod:
    build:
      context: ./my-app
      target: prod
      # No VITE_* build args: the production Vite build reads `my-app/.env`
      # directly (it is included in the build context — see my-app/.dockerignore).
      # These are public browser identifiers, not secrets, so baking them in is
      # expected. This keeps the stack runnable without `--env-file`.
    ports:
      - "8080:80"
    depends_on:
      - api-prod

volumes:
  postgres_data:
