name: careconnect

services:
  postgres:
    image: postgres:16-alpine
    profiles: ["dev", "prod"]
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-dev:
    build:
      context: ./backend
      target: dev
    profiles: ["dev"]
    env_file:
      - ${BACKEND_ENV_FILE:-./backend/.env.docker}
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

  web-dev:
    build:
      context: ./my-app
      target: dev
    profiles: ["dev"]
    env_file:
      - ./my-app/.env
    ports:
      - "5173:5173"
    volumes:
      - ./my-app:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api-dev
    command: npm run dev -- --host 0.0.0.0

  api-prod:
    build:
      context: ./backend
      target: prod
    profiles: ["prod"]
    env_file:
      - ${BACKEND_ENV_FILE:-./backend/.env.docker}
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    depends_on:
      postgres:
        condition: service_healthy

  web-prod:
    build:
      context: ./my-app
      target: prod
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID:-}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    profiles: ["prod"]
    ports:
      - "8080:80"
    depends_on:
      - api-prod

  backend-check:
    build:
      context: ./backend
      target: dev
    profiles: ["test"]
    env_file:
      - ${BACKEND_ENV_FILE:-./backend/.env.docker}
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "npm run build && npm test"

  frontend-check:
    build:
      context: ./my-app
      target: dev
    profiles: ["test"]
    env_file:
      - ./my-app/.env
    volumes:
      - ./my-app:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm run build && npm run lint && npm test"

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
